<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AgriLogic">
<link rel="apple-touch-icon" href="icon-192.png"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AgriLogic — Milk Production Tracker</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="shared.css"></head><body>
<div class="offline-banner" id="offlineBanner">📡 Offline — AI features need internet.</div>
<div class="topbar" id="topbar"></div>
<div class="app-body"><div class="sidebar" id="sidebar"></div><div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
<div class="main-content"><div class="page">
<div class="page-header"><div class="page-badge" style="background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.15);color:#f0f0f0">🥛 Milk</div><h2>Milk Production <em>Tracker</em></h2></div>

<div class="fg">
  <div class="form-card"><div class="card-head"><span class="card-icon">🥛</span><h3>Log Milk Production</h3></div><div class="card-body">
    <div class="g2"><div class="field-group"><label class="field-label">Date</label><input type="date" id="m-date"></div><div class="field-group"><label class="field-label">Animal ID / Name</label><input type="text" id="m-animal" placeholder="e.g. D001 or Bella"></div></div>
    <div class="g2"><div class="field-group"><label class="field-label">Morning Yield (L)</label><input type="number" id="m-am" placeholder="e.g. 8.5" step="0.1"></div><div class="field-group"><label class="field-label">Evening Yield (L)</label><input type="number" id="m-pm" placeholder="e.g. 7.2" step="0.1"></div></div>
    <div class="g2"><div class="field-group"><label class="field-label">Quality</label><div class="sw"><select id="m-quality"><option>Normal</option><option>Excellent</option><option>Poor</option><option>Bloody</option><option>Watery</option></select></div></div><div class="field-group"><label class="field-label">Sale Price/L</label><input type="number" id="m-price" placeholder="e.g. 50" step="0.01"></div></div>
    <div class="field-group"><label class="field-label">Notes</label><input type="text" id="m-notes" placeholder="e.g. After treatment, heat observed..."></div>
    <button class="btn btn-green" style="width:100%" onclick="logMilk()">+ Log Entry</button>
  </div></div>
  <div class="form-card"><div class="card-head"><span class="card-icon">📊</span><h3>Summary</h3></div><div class="card-body" id="milkSummary"><p style="color:var(--muted);font-size:13px">No milk records yet.</p></div></div>
</div>
<div class="hist-section"><div class="hist-title">📋 Milk Log</div>
<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Date</th><th>Animal</th><th>AM (L)</th><th>PM (L)</th><th>Total</th><th>Quality</th><th>Revenue</th><th></th></tr></thead><tbody id="milkBody"></tbody></table></div>
<div class="hist-empty" id="milkEmpty">No milk records yet.</div></div>

</div></div></div>
<script src="shared.js"></script><script>
function logMilk(){const animal=document.getElementById('m-animal').value.trim();const date=document.getElementById('m-date').value;const am=parseFloat(document.getElementById('m-am').value)||0;const pm=parseFloat(document.getElementById('m-pm').value)||0;if(!animal||!date){alert('Please enter animal ID and date.');return;}const price=parseFloat(document.getElementById('m-price').value)||0;const entry={id:Date.now().toString(),animal,date,am,pm,total:am+pm,quality:document.getElementById('m-quality').value,price,revenue:(am+pm)*price,notes:document.getElementById('m-notes').value.trim()};save('milk',[entry,...DS('milk')].slice(0,500));['m-animal','m-am','m-pm','m-price','m-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});renderMilk();updateSummary();}
function deleteMilk(id){save('milk',DS('milk').filter(x=>x.id!==id));renderMilk();updateSummary();}
function renderMilk(){const h=DS('milk');const body=document.getElementById('milkBody');const empty=document.getElementById('milkEmpty');if(!h.length){body.innerHTML='';empty.style.display='block';return;}empty.style.display='none';body.innerHTML=h.slice(0,50).map(e=>`<tr><td>${e.date}</td><td style="font-weight:500">${escHtml(e.animal)}</td><td>${e.am}L</td><td>${e.pm}L</td><td style="font-weight:600;color:var(--green)">${fmt(e.total)}L</td><td>${e.quality}</td><td>${e.revenue>0?fmt(e.revenue):'—'}</td><td><button onclick="deleteMilk('${e.id}')" style="padding:3px 8px;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.18);border-radius:5px;color:#e74c3c;cursor:pointer;font-size:11px">✕</button></td></tr>`).join('');}
function updateSummary(){const h=DS('milk');const summary=document.getElementById('milkSummary');if(!h.length){summary.innerHTML='<p style="color:var(--muted);font-size:13px">No milk records yet.</p>';return;}const t7=h.filter(e=>e.date>=new Date(Date.now()-7*86400000).toISOString().split('T')[0]).reduce((s,e)=>s+(e.total||0),0);const animals=[...new Set(h.map(e=>e.animal))];const topProducers=animals.map(a=>{const entries=h.filter(e=>e.animal===a);return{animal:a,avg:entries.reduce((s,e)=>s+(e.total||0),0)/entries.length};}).sort((a,b)=>b.avg-a.avg);const totalRev=h.reduce((s,e)=>s+(e.revenue||0),0);summary.innerHTML=`<div class="stat-strip" style="grid-template-columns:1fr 1fr"><div class="scard" data-icon="🥛"><div class="scard-label">Last 7 Days</div><div class="scard-value" style="color:#f0f0f0;font-size:18px">${fmt(t7)}L</div></div><div class="scard" data-icon="💰"><div class="scard-label">Total Revenue</div><div class="scard-value" style="color:var(--green);font-size:18px">${fmt(totalRev)}</div></div></div><div style="margin-top:12px"><div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px">Top Producers</div>${topProducers.slice(0,5).map(a=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(82,183,136,0.06);font-size:12px"><span style="color:var(--cream)">${escHtml(a.animal)}</span><span style="color:var(--green);font-weight:600">${fmt(a.avg)}L/day avg</span></div>`).join('')}</div>`;}
renderMilk();updateSummary();

initShared('milk');
</script>
<script>if("serviceWorker"in navigator&&location.protocol!=="file:"){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}</script>
</body></html>
