<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AgriLogic">
<link rel="apple-touch-icon" href="icon-192.png"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AgriLogic — Weight Gain Tracker</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"><style>
/* ═══════════════════════════════════════════
   AGRILOGIC — SHARED STYLES v2.0
   ═══════════════════════════════════════════ */
:root {
  --deep:#0e1a12; --surface:#162019; --surface2:#1c2a20;
  --green:#52b788; --green-mid:#2d6a4f; --green-deep:#1a3a2a;
  --gold:#d4a017; --gold-light:#f0c940;
  --cream:#f5f0e8; --muted:#4a7060; --border:rgba(82,183,136,0.1);
  --danger:#c0392b; --warn:#e67e22; --blue:#2e86ab;
  --purple:#8e44ad; --teal:#16a085; --brown:#7c5c3a;
  --sidebar-w:220px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--deep);color:var(--cream);display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(82,183,136,0.07) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(212,160,23,0.05) 0%,transparent 55%);pointer-events:none;z-index:0;}

/* TOPBAR */
.topbar{position:relative;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;border-bottom:1px solid var(--border);background:rgba(14,26,18,0.98);backdrop-filter:blur(16px);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;cursor:pointer;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--green),var(--gold));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-text{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--cream);}
.logo-text span{color:var(--green);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.lang-toggle{display:flex;gap:3px;background:rgba(255,255,255,0.04);border-radius:7px;padding:3px;}
.lang-btn{padding:4px 10px;border:none;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--muted);}
.lang-btn.active{background:var(--green);color:var(--green-deep);}
.menu-toggle{background:transparent;border:none;color:var(--cream);font-size:20px;cursor:pointer;padding:4px;display:none;}
.install-btn{padding:5px 11px;background:rgba(82,183,136,0.12);border:1px solid rgba(82,183,136,0.25);border-radius:7px;color:var(--green);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;display:none;gap:5px;align-items:center;}
.install-btn.show{display:flex;}

/* APP BODY */
.app-body{display:flex;flex:1;overflow:hidden;position:relative;z-index:5;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:rgba(20,30,22,0.98);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transition:transform 0.3s;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(82,183,136,0.15);border-radius:2px;}
.sb-section{padding:12px 10px 6px;}
.sb-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;padding:0 8px;margin-bottom:4px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:all 0.2s;border:none;background:transparent;width:100%;text-align:left;font-family:'DM Sans',sans-serif;color:var(--muted);font-size:12px;font-weight:500;position:relative;text-decoration:none;}
.sb-item:hover{background:rgba(82,183,136,0.07);color:var(--cream);}
.sb-item.active{background:rgba(82,183,136,0.12);color:var(--green);}
.sb-item.active::before{content:'';position:absolute;left:0;top:25%;height:50%;width:2px;background:var(--green);border-radius:0 2px 2px 0;}
.sb-icon{font-size:14px;flex-shrink:0;}
.sb-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;background:rgba(82,183,136,0.15);color:var(--green);margin-left:auto;}
.sb-divider{height:1px;background:var(--border);margin:5px 10px;}
.sb-farm{margin:10px;background:rgba(82,183,136,0.06);border:1px solid rgba(82,183,136,0.12);border-radius:11px;padding:12px;}
.sb-farm-title{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:7px;}
.sb-farm-item{font-size:11px;color:var(--muted);margin-bottom:3px;}
.sb-farm-item span{color:var(--cream);}
.sb-farm-edit{margin-top:8px;width:100%;padding:6px;background:transparent;border:1px dashed rgba(82,183,136,0.22);border-radius:7px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;transition:all 0.2s;}
.sb-farm-edit:hover{border-color:var(--green);color:var(--green);}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:90;}

/* MAIN CONTENT */
.main-content{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}
.main-content::-webkit-scrollbar{width:4px;}
.main-content::-webkit-scrollbar-thumb{background:rgba(82,183,136,0.18);border-radius:2px;}
.page{padding:26px;min-height:100%;animation:fadeUp 0.35s ease both;}

/* PAGE HEADER */
.page-badge{display:inline-flex;align-items:center;gap:5px;border-radius:16px;padding:4px 11px;font-size:10px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;margin-bottom:12px;border:1px solid;}
.page-header{margin-bottom:22px;}
.page-header h2{font-family:'Playfair Display',serif;font-size:clamp(20px,3vw,28px);font-weight:900;line-height:1.1;margin-bottom:5px;}
.page-header h2 em{font-style:normal;color:var(--green);}
.page-header p{font-size:13px;color:var(--muted);line-height:1.6;max-width:560px;}

/* FORM CARDS */
.form-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:14px;}
.card-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.card-head h3{font-size:13px;font-weight:600;color:var(--cream);}
.card-icon{font-size:16px;}
.card-body{padding:18px;}

/* FORM FIELDS */
.field-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field-group:last-child{margin-bottom:0;}
.field-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;}
input[type=text],input[type=number],input[type=date],input[type=email],
input[type=password],select,textarea{background:rgba(255,255,255,0.05);border:1px solid rgba(82,183,136,0.13);border-radius:9px;padding:10px 13px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;width:100%;transition:border-color 0.2s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green);}
input::placeholder,textarea::placeholder{color:rgba(74,112,96,0.5);}
select option{background:var(--deep);}
.sw{position:relative;}
.sw select{padding-right:30px;appearance:none;cursor:pointer;}
.sw::after{content:'▾';position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.fg .full{grid-column:1/-1;}

/* BUTTONS */
.btn{padding:10px 18px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.22s;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
.btn:hover{transform:translateY(-1px);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-green{background:linear-gradient(135deg,var(--green-mid),var(--green));color:white;}
.btn-green:hover{box-shadow:0 6px 20px rgba(82,183,136,0.28);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--green-deep);}
.btn-gold:hover{box-shadow:0 6px 20px rgba(212,160,23,0.28);}
.btn-blue{background:linear-gradient(135deg,#1a5f7a,var(--blue));color:white;}
.btn-purple{background:linear-gradient(135deg,#6c3483,var(--purple));color:white;}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:7px;}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--green);color:var(--green);transform:none;}
.btn-danger{background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.2);color:#e74c3c;}
.btn-danger:hover{background:rgba(192,57,43,0.2);transform:none;}
.btn-full{width:100%;padding:14px;}
.btn-wa{background:#25D366;color:white;}
.btn-wa:hover{box-shadow:0 6px 20px rgba(37,211,102,0.28);}

/* LOADING */
.loading-state{display:none;text-align:center;padding:44px 20px;}
.spinner{width:40px;height:40px;border:3px solid rgba(82,183,136,0.15);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
.loading-state strong{display:block;font-size:15px;color:var(--green);margin-bottom:3px;}
.loading-state p{font-size:13px;color:var(--muted);}

/* RESULT BLOCKS */
.result-section{display:none;margin-top:20px;animation:fadeUp 0.4s ease both;}
.rblock{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:13px;padding:16px 18px;margin-bottom:10px;}
.rblock h4{font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.rblock p{font-size:13px;line-height:1.7;color:rgba(245,240,232,0.85);}
.rblock ul{list-style:none;display:grid;gap:5px;}
.rblock ul li{font-size:12px;color:rgba(245,240,232,0.82);padding-left:16px;position:relative;line-height:1.5;}
.rblock ul li::before{content:'→';position:absolute;left:0;color:var(--green);font-size:11px;}
.rblock.warn{border-color:rgba(230,126,34,0.22);background:rgba(230,126,34,0.04);}
.rblock.warn h4{color:var(--warn);}
.rblock.good{border-color:rgba(82,183,136,0.22);background:rgba(82,183,136,0.04);}
.rblock.gold{border-color:rgba(212,160,23,0.22);background:rgba(212,160,23,0.04);}
.rblock.gold h4{color:var(--gold-light);}
.rblock.danger{border-color:rgba(192,57,43,0.22);background:rgba(192,57,43,0.04);}
.rblock.danger h4{color:#e74c3c;}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rgrid .full{grid-column:1/-1;}

/* STAT STRIP */
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.scard{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:13px;padding:14px;text-align:center;position:relative;overflow:hidden;}
.scard::before{content:attr(data-icon);position:absolute;right:9px;top:7px;font-size:20px;opacity:0.2;}
.scard-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px;}
.scard-value{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.scard-sub{font-size:10px;color:var(--muted);margin-top:2px;}

/* HISTORY */
.hist-section{margin-top:26px;}
.hist-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.hist-empty{text-align:center;padding:24px;color:var(--muted);font-size:13px;background:rgba(255,255,255,0.02);border:1px dashed rgba(82,183,136,0.1);border-radius:13px;}
.hist-list{display:grid;gap:7px;}
.hist-item{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:11px;padding:12px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all 0.2s;}
.hist-item:hover{background:rgba(82,183,136,0.05);border-color:rgba(82,183,136,0.18);}
.hist-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:rgba(82,183,136,0.08);}
.hist-info{flex:1;min-width:0;}
.hist-name{font-size:12px;font-weight:500;color:var(--cream);}
.hist-meta{font-size:10px;color:var(--muted);margin-top:1px;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;padding:9px 12px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid var(--border);}
.tbl td{padding:10px 12px;font-size:12px;color:var(--cream);border-bottom:1px solid rgba(82,183,136,0.04);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(82,183,136,0.03);}
.tbl-wrap{overflow-x:auto;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(5px);}
.modal-overlay.open{display:flex;}
.modal{background:#192215;border:1px solid rgba(82,183,136,0.18);border-radius:17px;padding:24px;width:90%;max-width:460px;animation:fadeUp 0.3s ease both;max-height:90vh;overflow-y:auto;}
.modal h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.modal-fields{display:grid;gap:9px;margin-bottom:16px;}
.modal-actions{display:flex;gap:9px;justify-content:flex-end;}
.modal-cancel{padding:8px 15px;background:transparent;border:1px solid rgba(82,183,136,0.13);border-radius:8px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;}
.modal-cancel:hover{border-color:var(--green);color:var(--green);}
.modal-save{padding:8px 18px;background:linear-gradient(135deg,var(--green-deep),var(--green));border:none;border-radius:8px;color:white;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.modal-save:hover{transform:translateY(-1px);}

/* TAGS/CHIPS */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.tag{padding:5px 11px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;font-size:11px;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.tag:hover{border-color:var(--green);color:var(--green);}
.tag.active{border-color:var(--green);color:var(--green);background:rgba(82,183,136,0.08);}

/* ALERTS */
.alert{border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:9px;display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.alert-warn{background:rgba(230,126,34,0.08);border:1px solid rgba(230,126,34,0.2);color:var(--warn);}
.alert-danger{background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.2);color:#e74c3c;}
.alert-success{background:rgba(82,183,136,0.08);border:1px solid rgba(82,183,136,0.2);color:var(--green);}
.alert-info{background:rgba(46,134,171,0.08);border:1px solid rgba(46,134,171,0.2);color:#54c6eb;}

/* FILTER TABS */
.ftabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.ftab{padding:6px 13px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.ftab.active{background:rgba(82,183,136,0.1);border-color:rgba(82,183,136,0.3);color:var(--green);}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;}
.data-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;padding:16px;transition:all 0.22s;}
.data-card:hover{transform:translateY(-2px);border-color:rgba(82,183,136,0.22);}

/* OFFLINE BANNER */
.offline-banner{display:none;position:fixed;top:54px;left:0;right:0;z-index:90;background:rgba(192,57,43,0.9);backdrop-filter:blur(8px);padding:7px 20px;text-align:center;font-size:12px;color:white;font-weight:500;}
.offline-banner.show{display:block;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

/* RESPONSIVE */
@media(max-width:900px){
  .menu-toggle{display:flex;}
  .sidebar{position:fixed;left:0;top:54px;bottom:0;z-index:95;transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .sb-overlay{display:block;}
  .rgrid{grid-template-columns:1fr;}
  .rgrid .full{grid-column:1;}
  .stat-strip{grid-template-columns:1fr 1fr;}
  .fg{grid-template-columns:1fr;}
  .fg .full{grid-column:1;}
}
@media(max-width:580px){
  .g2,.g3{grid-template-columns:1fr;}
  .page{padding:14px;}
  .card-grid{grid-template-columns:1fr;}
}

</style></head><body>
<div class="offline-banner" id="offlineBanner">📡 Offline — AI features need internet.</div>
<div class="topbar" id="topbar"></div>
<div class="app-body"><div class="sidebar" id="sidebar"></div><div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
<div class="main-content"><div class="page">
<div class="page-header"><div class="page-badge" style="background:rgba(22,160,133,0.1);border-color:rgba(22,160,133,0.25);color:#76d7c4">⚖️ Weight</div><h2>Weight Gain <em>Tracker</em></h2></div>

<div class="fg">
  <div class="form-card"><div class="card-head"><span class="card-icon">⚖️</span><h3>Log Weight</h3></div><div class="card-body">
    <div class="g2"><div class="field-group"><label class="field-label">Animal ID / Batch</label><input type="text" id="w-animal" placeholder="e.g. B001 or Batch A"></div><div class="field-group"><label class="field-label">Date</label><input type="date" id="w-date"></div></div>
    <div class="g2"><div class="field-group"><label class="field-label">Weight (kg)</label><input type="number" id="w-weight" placeholder="e.g. 2.1" step="0.01"></div><div class="field-group"><label class="field-label">Animal Type</label><div class="sw"><select id="w-type"><option>Broiler</option><option>Layer</option><option>Bull</option><option>Dairy Cow</option><option>Goat</option><option>Pig</option><option>Other</option></select></div></div></div>
    <div class="g2"><div class="field-group"><label class="field-label">Age (days)</label><input type="number" id="w-age" placeholder="e.g. 35" min="0"></div><div class="field-group"><label class="field-label">Sample Size</label><input type="number" id="w-sample" placeholder="e.g. 10 birds" min="1"></div></div>
    <div class="field-group"><label class="field-label">Notes</label><input type="text" id="w-notes" placeholder="e.g. After medication, feed change..."></div>
    <button class="btn" style="width:100%;background:linear-gradient(135deg,var(--teal),#1abc9c);color:white;border:none;border-radius:10px;padding:11px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600" onclick="logWeight()">+ Log Weight Entry</button>
  </div></div>
  <div class="form-card"><div class="card-head"><span class="card-icon">📈</span><h3>Growth Summary</h3></div><div class="card-body" id="weightSummary"><p style="color:var(--muted);font-size:13px">No weight records yet.</p></div></div>
</div>
<div class="hist-section"><div class="hist-title">📋 Weight Log</div>
<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Date</th><th>Animal/Batch</th><th>Type</th><th>Age (days)</th><th>Weight (kg)</th><th>Daily Gain</th><th>Notes</th><th></th></tr></thead><tbody id="weightBody"></tbody></table></div>
<div class="hist-empty" id="weightEmpty">No weight records yet.</div></div>

</div></div></div>
<script>
// AGRILOGIC SHARED.JS v3.0 - Ultra stable, no special chars
var DS = function(k) { try { return JSON.parse(localStorage.getItem('al_'+k)||'[]'); } catch(e) { return []; } };
var save = function(k,d) { try { localStorage.setItem('al_'+k,JSON.stringify(d)); } catch(e) {} };
var getProfile = function() { try { return JSON.parse(localStorage.getItem('al_farm')||'{}'); } catch(e) { return {}; } };
var saveProfile = function(p) { try { localStorage.setItem('al_farm',JSON.stringify(p)); } catch(e) {} };
var fmt = function(n) { return n!=null ? Number(n).toLocaleString(undefined,{maximumFractionDigits:1}) : '-'; };
var fmtI = function(n) { return n!=null ? Number(n).toLocaleString(undefined,{maximumFractionDigits:0}) : '-'; };
var today = function() { return new Date().toISOString().split('T')[0]; };
var thisMonth = function() { return today().slice(0,7); };
var escHtml = function(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
var parseAI = function(raw) { try { return JSON.parse(raw.replace(/```json|```/g,'').trim()); } catch(e) { return null; } };
var fileToB64 = function(file) { return new Promise(function(res,rej){ var r=new FileReader(); r.onload=function(e){res(e.target.result);}; r.onerror=function(){rej(new Error('fail'));}; r.readAsDataURL(file); }); };

var currentLang = localStorage.getItem('al_lang') || 'en';

  var notes = {sw:'Jibu kwa Kiswahili.',fr:'Repondez en francais.',am:'Respond in Amharic if possible.',ki:'Cokio na Gikuyu.',lg:'Ddamu mu Luganda.'};

function setLang(code) {
  try {
    currentLang = code;
    localStorage.setItem('al_lang', code);
    buildTopbar();
    buildSidebar(window.AL_PAGE || 'dashboard');
  } catch(e) {}
}

function buildLangToggle() {
  try {
    var el = document.getElementById('langToggle');
    if (!el) return;
    var langs = [{c:'en',l:'EN'},{c:'sw',l:'SW'},{c:'fr',l:'FR'},{c:'am',l:'AM'},{c:'ki',l:'GI'},{c:'lg',l:'LG'}];
    el.innerHTML = langs.map(function(lang) {
      var active = lang.c === currentLang ? ' active' : '';
      return '<button class="lang-btn' + active + '" data-lang="' + lang.c + '" onclick="setLang(this.dataset.lang)">' + lang.l + '</button>';
    }).join('');
  } catch(e) {}
}

async function callAI(prompt, isArray) {
  var messages = isArray ? prompt : [{role:'user',content:prompt}];
  var resp = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:messages})});
  var data = await resp.json();
  return data.content ? data.content.map(function(c){return c.text||'';}).join('') : '';
}

async function callAIWithSystem(system, messages) {
  var resp = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:system,messages:messages})});
  var data = await resp.json();
  return data.content ? data.content.map(function(c){return c.text||'';}).join('') : '';
}

function buildSidebar(activePage) {
  try {
    var sidebar = document.getElementById('sidebar');
    if (!sidebar) return;
    var profile = getProfile();
    var html = '';
    var lastSection = '';
    PAGES.forEach(function(p) {
      if (p.section !== lastSection) {
        if (lastSection) html += '</div>';
        html += '<div class="sb-section"><div class="sb-label">' + p.section + '</div>';
        lastSection = p.section;
      }
      html += '<a class="sb-item' + (p.id===activePage?' active':'') + '" href="' + p.href + '">';
      html += '<span class="sb-icon">' + p.icon + '</span><span>' + p.label + '</span>';
      if (p.badge) html += '<span class="sb-badge">' + p.badge + '</span>';
      html += '</a>';
    });
    html += '</div><div class="sb-divider"></div><div class="sb-farm"><div class="sb-farm-title">My Farm</div><div id="sbFarmContent">';
    var items = [];
    if (profile.name)     items.push('&#127968; <span>'+escHtml(profile.name)+'</span>');
    if (profile.location) items.push('&#128205; <span>'+escHtml(profile.location)+'</span>');
    if (profile.animal)   items.push('&#128062; <span>'+escHtml(profile.animal)+'</span>');
    if (profile.crops)    items.push('&#127806; <span>'+escHtml(profile.crops)+'</span>');
    if (profile.size)     items.push('&#128208; <span>'+escHtml(profile.size)+'</span>');
    html += items.length ? items.map(function(i){return '<div class="sb-farm-item">'+i+'</div>';}).join('') : '<div class="sb-farm-item">No farm info yet</div>';
    html += '</div><button class="sb-farm-edit" onclick="openFarmModal()">Edit Farm Info</button></div>';
    sidebar.innerHTML = html;
  } catch(e) { console.log('buildSidebar error:',e); }
}

function toggleSidebar() {
  try {
    var s = document.getElementById('sidebar');
    var o = document.getElementById('sbOverlay');
    if (!s) return;
    var open = s.classList.toggle('open');
    if (o) o.style.display = open ? 'block' : 'none';
  } catch(e) {}
}

function openFarmModal() {
  try {
    var profile = getProfile();
    var modal = document.getElementById('farmModal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'farmModal';
      modal.className = 'modal-overlay';
      modal.innerHTML = '<div class="modal"><h3>My Farm Profile</h3><p class="modal-sub">Helps AI give personalised advice.</p><div class="modal-fields"><input type="text" id="fm-name" placeholder="Farm name"><input type="text" id="fm-location" placeholder="Location (e.g. Nakuru, Kenya)"><div class="sw"><select id="fm-animal"><option value="">Main livestock</option><option value="Broiler Chicken">Broiler Chickens</option><option value="Layer Chickens">Layer Chickens</option><option value="Bull">Bulls</option><option value="Dairy Cows">Dairy Cows</option><option value="Goats">Goats</option><option value="Sheep">Sheep</option><option value="Tilapia">Tilapia</option><option value="Catfish">Catfish</option></select></div><input type="text" id="fm-crops" placeholder="Main crops"><input type="text" id="fm-size" placeholder="Farm size (e.g. 2 acres)"><div class="sw"><select id="fm-exp"><option value="">Farming experience</option><option value="Beginner (0-2 years)">Beginner (0-2 years)</option><option value="Intermediate (3-7 years)">Intermediate (3-7 years)</option><option value="Experienced (7+ years)">Experienced (7+ years)</option></select></div></div><div class="modal-actions"><button class="modal-cancel" onclick="closeFarmModal()">Cancel</button><button class="modal-save" onclick="saveFarmProfileModal()">Save Profile</button></div></div>';
      document.body.appendChild(modal);
    }
    ['name','location','crops','size'].forEach(function(k){var el=document.getElementById('fm-'+k);if(el)el.value=profile[k]||'';});
    var an=document.getElementById('fm-animal');if(an)an.value=profile.animal||'';
    var ex=document.getElementById('fm-exp');if(ex)ex.value=profile.exp||'';
    modal.classList.add('open');
  } catch(e) { console.log('openFarmModal error:',e); }
}

function closeFarmModal() { var m=document.getElementById('farmModal');if(m)m.classList.remove('open'); }

function saveFarmProfileModal() {
  try {
    saveProfile({
      name:    (document.getElementById('fm-name')?document.getElementById('fm-name').value:'').trim(),
      location:(document.getElementById('fm-location')?document.getElementById('fm-location').value:'').trim(),
      animal:   document.getElementById('fm-animal')?document.getElementById('fm-animal').value:'',
      crops:   (document.getElementById('fm-crops')?document.getElementById('fm-crops').value:'').trim(),
      size:    (document.getElementById('fm-size')?document.getElementById('fm-size').value:'').trim(),
      exp:      document.getElementById('fm-exp')?document.getElementById('fm-exp').value:''
    });
    closeFarmModal();
    buildSidebar(window.AL_PAGE||'dashboard');
  } catch(e) {}
}

var deferredInstall = null;
function setupPWA() {
  try {
    window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredInstall=e;var btn=document.getElementById('installBtn');if(btn)btn.classList.add('show');});
    var chk=function(){var b=document.getElementById('offlineBanner');if(b)b.classList.toggle('show',!navigator.onLine);};
    window.addEventListener('online',chk);window.addEventListener('offline',chk);chk();
  } catch(e) {}
}
function installPWA() { if(!deferredInstall)return;deferredInstall.prompt();deferredInstall.userChoice.then(function(){deferredInstall=null;}); }

function initShared(activePage) {
  try {
    window.AL_PAGE = activePage;
    buildTopbar();
    buildSidebar(activePage);
    setupPWA();
    document.querySelectorAll('input[type="date"]').forEach(function(el){if(!el.value)el.value=today();});
  } catch(e) { console.log('initShared error:',e); }
}

function logWeight(){const animal=document.getElementById('w-animal').value.trim();const date=document.getElementById('w-date').value;const weight=parseFloat(document.getElementById('w-weight').value);if(!animal||!date||!weight){alert('Please fill in animal, date and weight.');return;}const age=parseInt(document.getElementById('w-age').value)||null;const prev=DS('weight').filter(e=>e.animal===animal).sort((a,b)=>b.date>a.date?-1:1)[0];const dailyGain=prev?((weight-prev.weight)/Math.max(1,Math.ceil((new Date(date)-new Date(prev.date))/86400000))).toFixed(3):null;const entry={id:Date.now().toString(),animal,date,weight,type:document.getElementById('w-type').value,age,sample:parseInt(document.getElementById('w-sample').value)||1,dailyGain,notes:document.getElementById('w-notes').value.trim()};save('weight',[entry,...DS('weight')].slice(0,500));['w-animal','w-weight','w-age','w-sample','w-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});renderWeight();updateSummary();}
function deleteWeight(id){save('weight',DS('weight').filter(x=>x.id!==id));renderWeight();}
function renderWeight(){const h=DS('weight');const body=document.getElementById('weightBody');const empty=document.getElementById('weightEmpty');if(!h.length){body.innerHTML='';empty.style.display='block';return;}empty.style.display='none';body.innerHTML=h.slice(0,50).map(e=>`<tr><td>${e.date}</td><td style="font-weight:500">${escHtml(e.animal)}</td><td>${e.type}</td><td>${e.age||'—'}</td><td style="font-weight:600;color:var(--green)">${e.weight}kg</td><td style="color:${e.dailyGain>0?'var(--green)':'var(--muted)'}">${e.dailyGain?e.dailyGain+'kg/day':'—'}</td><td style="font-size:11px;color:var(--muted)">${escHtml(e.notes||'—')}</td><td><button onclick="deleteWeight('${e.id}')" style="padding:3px 8px;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.18);border-radius:5px;color:#e74c3c;cursor:pointer;font-size:11px">✕</button></td></tr>`).join('');}
function updateSummary(){const h=DS('weight');const summary=document.getElementById('weightSummary');if(!h.length){summary.innerHTML='<p style="color:var(--muted);font-size:13px">No weight records yet.</p>';return;}const animals=[...new Set(h.map(e=>e.animal))];const latest=animals.map(a=>{const entries=h.filter(e=>e.animal===a).sort((a,b)=>b.date>a.date?-1:1);const l=entries[0];const prev=entries[1];const gain=prev?((l.weight-prev.weight)/Math.max(1,Math.ceil((new Date(l.date)-new Date(prev.date))/86400000))).toFixed(2):null;return{animal:a,weight:l.weight,date:l.date,gain};}).sort((a,b)=>b.weight-a.weight);summary.innerHTML=`<div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px">Latest Weights</div>${latest.slice(0,5).map(a=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(82,183,136,0.06);font-size:12px"><span style="color:var(--cream)">${escHtml(a.animal)}</span><div style="text-align:right"><div style="font-weight:600;color:var(--green)">${a.weight}kg</div>${a.gain?`<div style="font-size:10px;color:var(--muted)">${a.gain}kg/day</div>`:''}</div></div>`).join('')}`;}
renderWeight();updateSummary();

initShared('weight');
