<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AgriLogic">
<link rel="apple-touch-icon" href="icon-192.png"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AgriLogic — Egg Production Tracker</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="shared.css"></head><body>
<div class="offline-banner" id="offlineBanner">📡 Offline — AI features need internet.</div>
<div class="topbar" id="topbar"></div>
<div class="app-body"><div class="sidebar" id="sidebar"></div><div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
<div class="main-content"><div class="page">
<div class="page-header"><div class="page-badge" style="background:rgba(212,160,23,0.1);border-color:rgba(212,160,23,0.25);color:var(--gold-light)">🥚 Eggs</div><h2>Egg Production <em>Tracker</em></h2></div>

<div class="fg">
  <div class="form-card"><div class="card-head"><span class="card-icon">🥚</span><h3>Log Egg Collection</h3></div><div class="card-body">
    <div class="g2"><div class="field-group"><label class="field-label">Date</label><input type="date" id="e-date"></div><div class="field-group"><label class="field-label">Flock / Pen ID</label><input type="text" id="e-flock" placeholder="e.g. Pen A or Layer 1"></div></div>
    <div class="g3"><div class="field-group"><label class="field-label">Eggs Collected</label><input type="number" id="e-count" placeholder="e.g. 240" min="0"></div><div class="field-group"><label class="field-label">Broken/Rejected</label><input type="number" id="e-broken" placeholder="e.g. 5" min="0"></div><div class="field-group"><label class="field-label">Flock Size</label><input type="number" id="e-size" placeholder="e.g. 300" min="0"></div></div>
    <div class="g2"><div class="field-group"><label class="field-label">Sale Price / Egg</label><input type="number" id="e-price" placeholder="e.g. 15" step="0.01"></div><div class="field-group"><label class="field-label">Feed Used (kg)</label><input type="number" id="e-feed" placeholder="e.g. 42" step="0.1"></div></div>
    <div class="field-group"><label class="field-label">Notes</label><input type="text" id="e-notes" placeholder="e.g. New feed brand, stress observed..."></div>
    <button class="btn btn-gold" style="width:100%" onclick="logEgg()">+ Log Entry</button>
  </div></div>
  <div class="form-card"><div class="card-head"><span class="card-icon">📊</span><h3>Flock Stats</h3></div><div class="card-body" id="eggSummary"><p style="color:var(--muted);font-size:13px">No egg records yet.</p></div></div>
</div>
<div class="hist-section"><div class="hist-title">📋 Egg Log</div>
<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Date</th><th>Flock</th><th>Collected</th><th>Broken</th><th>Laying %</th><th>Revenue</th><th>Feed kg</th><th></th></tr></thead><tbody id="eggBody"></tbody></table></div>
<div class="hist-empty" id="eggEmpty">No egg records yet.</div></div>

</div></div></div>
<script src="shared.js"></script><script>
function logEgg(){const flock=document.getElementById('e-flock').value.trim();const date=document.getElementById('e-date').value;const count=parseInt(document.getElementById('e-count').value)||0;const broken=parseInt(document.getElementById('e-broken').value)||0;const size=parseInt(document.getElementById('e-size').value)||0;const price=parseFloat(document.getElementById('e-price').value)||0;const feed=parseFloat(document.getElementById('e-feed').value)||0;if(!flock||!date){alert('Please enter flock ID and date.');return;}const layingPct=size>0?((count/size)*100).toFixed(1):null;const entry={id:Date.now().toString(),flock,date,count,broken,size,layingPct,price,revenue:count*price,feed,notes:document.getElementById('e-notes').value.trim()};save('eggs',[entry,...DS('eggs')].slice(0,500));['e-flock','e-count','e-broken','e-size','e-price','e-feed','e-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});renderEggs();updateSummary();}
function deleteEgg(id){save('eggs',DS('eggs').filter(x=>x.id!==id));renderEggs();updateSummary();}
function renderEggs(){const h=DS('eggs');const body=document.getElementById('eggBody');const empty=document.getElementById('eggEmpty');if(!h.length){body.innerHTML='';empty.style.display='block';return;}empty.style.display='none';body.innerHTML=h.slice(0,50).map(e=>`<tr><td>${e.date}</td><td style="font-weight:500">${escHtml(e.flock)}</td><td style="font-weight:600;color:var(--gold-light)">${e.count}</td><td style="color:#e74c3c">${e.broken||0}</td><td style="color:${parseFloat(e.layingPct)>80?'var(--green)':parseFloat(e.layingPct)>60?'var(--warn)':'#e74c3c'}">${e.layingPct||'—'}%</td><td>${e.revenue>0?fmt(e.revenue):'—'}</td><td>${e.feed||'—'}</td><td><button onclick="deleteEgg('${e.id}')" style="padding:3px 8px;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.18);border-radius:5px;color:#e74c3c;cursor:pointer;font-size:11px">✕</button></td></tr>`).join('');}
function updateSummary(){const h=DS('eggs');const summary=document.getElementById('eggSummary');if(!h.length){summary.innerHTML='<p style="color:var(--muted);font-size:13px">No egg records yet.</p>';return;}const t7=h.filter(e=>e.date>=new Date(Date.now()-7*86400000).toISOString().split('T')[0]).reduce((s,e)=>s+(e.count||0),0);const avgLaying=h.filter(e=>e.layingPct).reduce((s,e,_,a)=>s+parseFloat(e.layingPct)/a.length,0);const totalRev=h.reduce((s,e)=>s+(e.revenue||0),0);summary.innerHTML=`<div class="stat-strip" style="grid-template-columns:1fr 1fr"><div class="scard" data-icon="🥚"><div class="scard-label">Last 7 Days</div><div class="scard-value" style="color:var(--gold-light);font-size:18px">${fmtI(t7)} eggs</div></div><div class="scard" data-icon="📈"><div class="scard-label">Avg Laying Rate</div><div class="scard-value" style="color:var(--green);font-size:18px">${isNaN(avgLaying)?'—':fmt(avgLaying)}%</div></div></div><div style="margin-top:12px;font-size:12px;color:var(--muted)">Total revenue: <span style="color:var(--green);font-weight:600">${fmt(totalRev)}</span></div>`;}
renderEggs();updateSummary();

initShared('eggs');
</script><script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(r => console.log("SW registered:", r.scope))
      .catch(e => console.log("SW error:", e));
  });
}
</script>
</body></html>
