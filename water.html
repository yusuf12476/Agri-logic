<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AgriLogic — Water & Irrigation Tracker</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="../shared.css"></head><body>
<div class="offline-banner" id="offlineBanner">📡 Offline — AI features need internet.</div>
<div class="topbar" id="topbar"></div>
<div class="app-body"><div class="sidebar" id="sidebar"></div><div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
<div class="main-content"><div class="page">
<div class="page-header"><div class="page-badge" style="background:rgba(46,134,171,0.1);border-color:rgba(46,134,171,0.25);color:#54c6eb">💧 Water</div><h2>Water & Irrigation <em>Tracker</em></h2></div>

<div class="fg">
  <div class="form-card"><div class="card-head"><span class="card-icon">💧</span><h3>Log Water Usage</h3></div><div class="card-body">
    <div class="g2"><div class="field-group"><label class="field-label">Crop / Area</label><input type="text" id="wt-crop" placeholder="e.g. Maize Block A"></div><div class="field-group"><label class="field-label">Date</label><input type="date" id="wt-date"></div></div>
    <div class="g2"><div class="field-group"><label class="field-label">Water Used (litres)</label><input type="number" id="wt-litres" placeholder="e.g. 2000"></div><div class="field-group"><label class="field-label">Duration (minutes)</label><input type="number" id="wt-duration" placeholder="e.g. 45"></div></div>
    <div class="g2"><div class="field-group"><label class="field-label">Method</label><div class="sw"><select id="wt-method"><option>Drip</option><option>Sprinkler</option><option>Flood/Furrow</option><option>Manual</option><option>Rain-fed</option></select></div></div><div class="field-group"><label class="field-label">Crop Stage</label><div class="sw"><select id="wt-stage"><option>Germination</option><option>Seedling</option><option>Vegetative</option><option>Flowering</option><option>Fruiting</option><option>Maturity</option></select></div></div></div>
    <div class="field-group"><label class="field-label">Farm Size (acres)</label><input type="number" id="wt-area" placeholder="e.g. 0.5" step="0.1"></div>
    <button class="btn btn-blue" style="width:100%" onclick="logWater()">+ Log Entry</button>
  </div></div>
  <div class="form-card"><div class="card-head"><span class="card-icon">🤖</span><h3>AI Irrigation Advice</h3></div><div class="card-body">
    <div class="field-group"><label class="field-label">Crop</label><input type="text" id="wa-crop" placeholder="e.g. Tomatoes"></div>
    <div class="field-group"><label class="field-label">Location</label><input type="text" id="wa-location" placeholder="e.g. Nakuru"></div>
    <div class="g2"><div class="field-group"><label class="field-label">Stage</label><div class="sw"><select id="wa-stage"><option>Germination</option><option>Seedling</option><option>Vegetative</option><option>Flowering</option><option>Fruiting</option><option>Maturity</option></select></div></div><div class="field-group"><label class="field-label">Current Weather</label><div class="sw"><select id="wa-weather"><option>Hot & dry</option><option>Warm & sunny</option><option>Cloudy</option><option>Light rain</option><option>Heavy rain</option></select></div></div></div>
    <div class="field-group"><label class="field-label">Farm Size (acres)</label><input type="number" id="wa-area" placeholder="e.g. 1" step="0.1"></div>
    <button class="btn btn-blue" style="width:100%" id="adviceBtn" onclick="runAdvice()">💧 Get Irrigation Advice</button>
  </div></div>
</div>
<div class="loading-state" id="loading"><div class="spinner" style="border-top-color:#5dade2"></div><strong>Analysing...</strong><p>Checking your irrigation needs</p></div>
<div class="result-section" id="result"></div>
<div class="hist-section"><div class="hist-title">📋 Water Log</div><div id="waterLog"><div class="hist-empty">No water entries yet.</div></div></div>

</div></div></div>
<script src="../shared.js"></script><script>
async function aiPrompt(prompt, loadId, resultId, btnId, showFn) {
  document.getElementById(loadId).style.display='block';
  if(resultId) document.getElementById(resultId).style.display='none';
  if(btnId) document.getElementById(btnId).disabled=true;
  try { const resp=await callAI(prompt); const r=parseAI(resp); if(!r) throw new Error('parse'); showFn(r); }
  catch(e) { console.error(e); alert('Error. Please try again.'); }
  finally { document.getElementById(loadId).style.display='none'; if(btnId) document.getElementById(btnId).disabled=false; }
}

function logWater(){const crop=document.getElementById('wt-crop').value.trim();const date=document.getElementById('wt-date').value;const litres=parseFloat(document.getElementById('wt-litres').value)||0;if(!crop||!date){alert('Please enter crop/area and date.');return;}const entry={id:Date.now().toString(),crop,date,litres,duration:parseFloat(document.getElementById('wt-duration').value)||0,method:document.getElementById('wt-method').value,stage:document.getElementById('wt-stage').value,area:parseFloat(document.getElementById('wt-area').value)||0};save('water',[entry,...DS('water')].slice(0,500));['wt-crop','wt-litres','wt-duration','wt-area'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});renderLog();}
function deleteWater(id){save('water',DS('water').filter(x=>x.id!==id));renderLog();}
function renderLog(){const h=DS('water');const el=document.getElementById('waterLog');if(!h.length){el.innerHTML='<div class="hist-empty">No water entries yet.</div>';return;}el.innerHTML='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Date</th><th>Crop/Area</th><th>Litres</th><th>Duration</th><th>Method</th><th>Stage</th><th></th></tr></thead><tbody>'+h.slice(0,30).map(e=>`<tr><td>${e.date}</td><td style="font-weight:500">${escHtml(e.crop)}</td><td style="font-weight:600;color:#5dade2">${e.litres}L</td><td>${e.duration?e.duration+' min':'—'}</td><td>${e.method}</td><td>${e.stage}</td><td><button onclick="deleteWater('${e.id}')" style="padding:3px 8px;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.18);border-radius:5px;color:#e74c3c;cursor:pointer;font-size:11px">✕</button></td></tr>`).join('')+'</tbody></table></div>';}
function runAdvice(){
  const crop=document.getElementById('wa-crop').value.trim();if(!crop){alert('Please enter a crop type.');return;}
  const recentLogs=DS('water').filter(x=>x.crop.toLowerCase().includes(crop.toLowerCase())).slice(0,3);
  const logSum=recentLogs.length?'Recent logs: '+recentLogs.map(x=>`${x.date}: ${x.litres}L on ${x.area||1} acres (${x.stage})`).join(', '):'';
  aiPrompt(`You are AgriLogic irrigation expert for East African farmers.
${langNote()}
Crop: ${crop}, Location: ${document.getElementById('wa-location').value||'East Africa'}, Stage: ${document.getElementById('wa-stage').value}, Weather: ${document.getElementById('wa-weather').value}, Area: ${document.getElementById('wa-area').value||1} acres
${logSum}
Respond ONLY with JSON:
{"water_status":"Overwatered/Optimal/Underwatered/Unknown","recommended_litres_per_acre_per_day":0,"frequency":"str","best_time":"str","method_recommendation":"str","signs_overwatering":["s1"],"signs_underwatering":["s1"],"weekly_schedule":[{"day":"Mon","action":"str","litres_per_acre":0}],"water_saving_tips":["t1"],"warnings":["w1"],"summary":"str"}`,
  'loading','result','adviceBtn',showAdvice);
}
function showAdvice(r){
  const sColor={Overwatered:'#e74c3c',Optimal:'var(--green)',Underwatered:'var(--warn)',Unknown:'var(--muted)'};
  const el=document.getElementById('result');el.style.display='block';
  el.innerHTML=`<div style="background:rgba(41,128,185,0.07);border:1px solid rgba(41,128,185,0.18);border-radius:17px;padding:22px;margin-bottom:14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px"><div><div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:4px">IRRIGATION STATUS</div><div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:${sColor[r.water_status]||'var(--green)'}">${r.water_status}</div></div><div style="text-align:right"><div style="font-size:11px;color:var(--muted)">Recommended daily</div><div style="font-size:20px;font-weight:700;color:#5dade2">${r.recommended_litres_per_acre_per_day||'—'} L/acre</div></div></div><p style="font-size:13px;color:rgba(245,240,232,0.85)">${escHtml(r.summary||'')}</p></div><div class="rgrid"><div class="rblock"><h4>⏰ Schedule</h4><ul><li>Frequency: <strong>${escHtml(r.frequency||'—')}</strong></li><li>Best time: <strong>${escHtml(r.best_time||'—')}</strong></li><li>Method: <strong>${escHtml(r.method_recommendation||'—')}</strong></li></ul></div><div class="rblock"><h4>📅 Weekly Plan</h4><ul>${(r.weekly_schedule||[]).map(d=>`<li><strong>${escHtml(d.day)}:</strong> ${escHtml(d.action)} (${d.litres_per_acre||0} L/acre)</li>`).join('')}</ul></div>${r.signs_overwatering?.length?`<div class="rblock warn"><h4>💦 Overwatering Signs</h4><ul>${r.signs_overwatering.map(s=>'<li>'+escHtml(s)+'</li>').join('')}</ul></div>`:''}${r.signs_underwatering?.length?`<div class="rblock warn"><h4>🏜️ Underwatering Signs</h4><ul>${r.signs_underwatering.map(s=>'<li>'+escHtml(s)+'</li>').join('')}</ul></div>`:''}<div class="rblock good full"><h4>💡 Water Saving Tips</h4><ul>${(r.water_saving_tips||[]).map(t=>'<li>'+escHtml(t)+'</li>').join('')}</ul></div></div>`;
  el.scrollIntoView({behavior:'smooth'});
}
renderLog();

initShared('water');
</script></body></html>
